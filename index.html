<title>N빵 계산기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f7;min-height:100vh;padding:1.2rem 1rem 3rem;}
  .wrap{max-width:420px;margin:0 auto;}
  h1{font-size:22px;font-weight:700;color:#111;margin-bottom:3px;}
  .sub{font-size:13px;color:#888;margin-bottom:1.4rem;}
  .lbl{font-size:12px;color:#888;margin-bottom:6px;display:block;font-weight:500;letter-spacing:0.03em;}
  .row{display:flex;gap:8px;margin-bottom:.9rem;align-items:center;}
  input[type=text],input[type=number]{
    height:44px;border-radius:12px;border:1.5px solid #e0e0e0;
    padding:0 14px;font-size:15px;background:#fff;color:#111;
    flex:1;font-family:'Noto Sans KR',sans-serif;
    transition:border-color .2s;outline:none;
  }
  input:focus{border-color:#1a73e8;}
  .btn{
    height:44px;padding:0 18px;border-radius:12px;
    border:1.5px solid #e0e0e0;background:#fff;color:#111;
    font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;
    font-family:'Noto Sans KR',sans-serif;transition:all .15s;
  }
  .btn:active{transform:scale(0.96);background:#f0f0f0;}
  .btn-p{background:#1a73e8;border-color:#1a73e8;color:#fff;font-weight:700;}
  .btn-p:active{background:#1558b0;}
  .tag{
    font-size:13px;color:#333;padding:9px 14px;
    background:#e8f0fe;border-radius:10px;margin-bottom:.9rem;
    display:none;border-left:3px solid #1a73e8;
  }
  .tag.show{display:block;}
  .err{
    font-size:13px;color:#d32f2f;padding:9px 14px;
    background:#fde8e8;border-radius:10px;margin-bottom:8px;
    display:none;border-left:3px solid #d32f2f;
  }
  .err.show{display:block;}
  .cands{display:none;margin-bottom:.9rem;}
  .cands.show{display:block;}
  .cands-lbl{font-size:12px;color:#888;margin-bottom:6px;font-weight:500;}
  .cand-item{
    padding:11px 14px;background:#fff;border:1.5px solid #e0e0e0;
    border-radius:12px;font-size:14px;color:#111;cursor:pointer;
    margin-bottom:6px;line-height:1.5;transition:all .15s;
  }
  .cand-item:active{background:#f5f5f7;}

  .card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:.9rem;border:1.5px solid #f0f0f0;}
  .card-title{font-size:13px;font-weight:700;color:#111;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .card-sub{font-size:11px;font-weight:400;color:#aaa;}

  .member-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .m-chip{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    padding:9px 4px;border-radius:12px;border:1.5px solid #e0e0e0;
    background:#fff;cursor:pointer;transition:all .15s;
  }
  .m-chip.on{border-color:#1a73e8;background:#e8f0fe;}
  .chip-av{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;
  }
  .chip-av.m{background:#dbeafe;color:#1d4ed8;}
  .chip-av.f{background:#fce7f3;color:#be185d;}
  .m-chip.on .chip-av.m{background:#1a73e8;color:#fff;}
  .m-chip.on .chip-av.f{background:#be185d;color:#fff;}
  .chip-name{font-size:11px;color:#888;font-weight:500;}
  .m-chip.on .chip-name{color:#1a73e8;font-weight:700;}

  .sr{display:flex;align-items:center;gap:10px;}
  .wbtn-row{display:flex;gap:6px;margin-bottom:8px;}
  .wbtn{
    flex:1;height:36px;border-radius:10px;border:1.5px solid #e0e0e0;
    background:#f8f8f8;color:#555;font-size:13px;font-weight:600;
    cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;
  }
  .wbtn:hover{background:#e8f0fe;border-color:#1a73e8;color:#1a73e8;}
  .wbtn.active{background:#1a73e8;border-color:#1a73e8;color:#fff;}
  .wbtn-ladder{
    flex:1.4;height:36px;border-radius:10px;border:1.5px dashed #1a73e8;
    background:#e8f0fe;color:#1a73e8;font-size:12px;font-weight:700;
    cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;
  }
  .wbtn-ladder:hover{background:#c5d8fb;}
  .wd{font-size:11px;color:#aaa;margin-top:8px;line-height:1.5;}

  .result{display:none;margin-top:.5rem;}
  .result.show{display:block;}
  .tbar{
    display:flex;justify-content:space-between;align-items:center;
    background:#111;border-radius:16px;padding:14px 18px;margin-bottom:12px;color:#fff;
  }
  .tl{font-size:13px;color:#aaa;}
  .tr{font-size:20px;font-weight:700;}

  .arow{display:flex;justify-content:center;flex-wrap:wrap;gap:4px;padding:12px 0 8px;}
  .ci{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .ci-img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2.5px solid #e0e0e0;transition:border-color .2s;}
  .ci.happy .ci-img{border-color:#1a73e8;}
  .ci.sad .ci-img{border-color:#aaa;filter:grayscale(40%);}
  .cn{font-size:10px;color:#888;}
  .ca{font-size:11px;font-weight:700;color:#111;}

  .flist{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .fc{
    background:#fff;border:1.5px solid #f0f0f0;border-radius:14px;
    padding:11px 14px;display:flex;align-items:center;gap:12px;
  }
  .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
  .av.m{background:#dbeafe;color:#1d4ed8;}
  .av.f{background:#fce7f3;color:#be185d;}
  .fi{flex:1;min-width:0;}
  .fn{font-size:14px;font-weight:700;color:#111;}
  .fd{font-size:11px;color:#aaa;margin-top:2px;}
  .fa{font-size:16px;font-weight:700;color:#111;}
  .rb{font-size:10px;padding:2px 7px;border-radius:20px;margin-left:5px;font-weight:700;}
  .rb-t{background:#fde8e8;color:#c62828;}
  .rb-b{background:#e8f5e9;color:#2e7d32;}

  .spin{
    display:inline-block;width:14px;height:14px;
    border:2px solid #ccc;border-top-color:#1a73e8;
    border-radius:50%;animation:spin .7s linear infinite;
    vertical-align:middle;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .fc-top{border-color:#ffd0d0;background:#fff8f8;}
  .fc-bot{border-color:#d0f0d0;background:#f8fff8;}

  /* 사다리타기 */
  .ladder-wrap{margin-top:10px;}
  .ladder-btn{
    width:100%;height:40px;border-radius:12px;
    border:1.5px dashed #1a73e8;background:#e8f0fe;
    color:#1a73e8;font-size:13px;font-weight:700;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;transition:all .15s;
  }
  .ladder-btn:active{transform:scale(0.97);}
  .ladder-modal{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
    z-index:999;align-items:center;justify-content:center;
  }
  .ladder-modal.open{display:flex;}
  .ladder-box{
    background:#fff;border-radius:20px;padding:24px 20px 20px;
    width:340px;max-width:92vw;
  }
  .ladder-head{font-size:16px;font-weight:700;color:#111;margin-bottom:4px;}
  .ladder-sub{font-size:12px;color:#888;margin-bottom:16px;}
  .ladder-svg-wrap{width:100%;}
  .ladder-result{
    text-align:center;font-size:14px;color:#333;
    margin-top:12px;min-height:28px;font-weight:500;line-height:1.4;
  }
  .ladder-result span{color:#1a73e8;font-size:22px;font-weight:700;}
  .ladder-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
  .ladder-actions .btn{font-size:13px;height:38px;padding:0 14px;}
  .btn-apply{background:#1a73e8;border-color:#1a73e8;color:#fff;font-weight:700;}
  .btn-apply:active{background:#1558b0;}
  .btn-apply.hidden,.btn.hidden{display:none;}

  /* PWA 배너 */
  #pwaBanner{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:#fff;border-top:1px solid #e8eaed;
    padding:12px 16px;display:flex;align-items:center;gap:12px;
    box-shadow:0 -4px 20px rgba(0,0,0,0.1);
    transform:translateY(100%);transition:transform .35s ease;
  }
  #pwaBanner.show{transform:translateY(0);}
  #pwaBanner .pwa-icon{width:44px;height:44px;border-radius:10px;flex-shrink:0;}
  #pwaBanner .pwa-text{flex:1;}
  #pwaBanner .pwa-title{font-size:13px;font-weight:700;color:#111;}
  #pwaBanner .pwa-sub{font-size:11px;color:#888;margin-top:1px;}
  #pwaBanner .pwa-add{
    background:#1a73e8;color:#fff;border:none;
    padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;
    cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;
  }
  #pwaBanner .pwa-close{
    background:none;border:none;color:#aaa;font-size:18px;
    cursor:pointer;padding:4px;line-height:1;
  }
  body.has-banner{padding-bottom:80px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>N빵 계산기</h1>
  <p class="sub">가까울수록 더 낸다 😈</p>

  <span class="lbl">모임 장소</span>
  <div class="row">
    <input type="text" id="venueInput" placeholder="장소명 또는 주소 입력" onkeydown="if(event.key==='Enter')searchVenue()"/>
    <button class="btn" onclick="searchVenue()">검색</button>
  </div>
  <div class="tag" id="venueTag"></div>
  <div class="cands" id="cands">
    <div class="cands-lbl">검색 결과 — 맞는 장소를 선택해 주세요</div>
    <div id="candList"></div>
  </div>
  <div class="err" id="errMsg"></div>

  <div class="card">
    <div class="card-title">참가자 선택 <span class="card-sub" id="memberCount">0명 선택됨</span></div>
    <div class="member-grid" id="memberGrid"></div>
  </div>

  <span class="lbl">총 금액 (원)</span>
  <div class="row">
    <input type="number" id="totalInput" placeholder="예: 150000" inputmode="numeric" pattern="[0-9]*" oninput="autoCalc()"/>
  </div>

  <div class="card">
    <div class="card-title">거리 가중치</div>
    <div class="wbtn-row">
      <button class="wbtn active" id="wbtn0" onclick="selectWeight(0)">0</button>
      <button class="wbtn" id="wbtn1" onclick="selectWeight(1)">1</button>
      <button class="wbtn" id="wbtn2" onclick="selectWeight(2)">2</button>
      <button class="wbtn" id="wbtn3" onclick="selectWeight(3)">3</button>
      <button class="wbtn" id="wbtn4" onclick="selectWeight(4)">4</button>
      <button class="wbtn" id="wbtn5" onclick="selectWeight(5)">5</button>
      <button class="wbtn-ladder" onclick="openLadder()">🎲 사다리</button>
    </div>
    <div class="wd" id="wd"></div>
  </div>

  <div class="result" id="result">
    <div class="tbar"><span class="tl">총액</span><span class="tr" id="tdisp"></span></div>
    <div class="arow" id="arow"></div>
    <div class="flist" id="flist"></div>
  </div>
</div>


<div class="ladder-modal" id="ladderModal">
  <div class="ladder-box">
    <div class="ladder-head">사다리타기</div>
    <div class="ladder-sub" id="ladderSub">1번~6번 중 하나를 선택하세요</div>
    <div class="ladder-svg-wrap">
      <svg id="ladderSvg" viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block"></svg>
    </div>
    <div class="ladder-result" id="ladderResult"></div>
    <div class="ladder-actions">
      <button class="btn" onclick="closeLadder()">닫기</button>
      <button class="btn btn-apply hidden" id="applyBtn" onclick="applyWeight()">이 가중치 적용 ✓</button>
    </div>
  </div>
</div>

let vLat=null,vLng=null;
let selected=new Set();
let psvc=null,gcsvc=null,kakaoReady=false;

window.addEventListener('load',()=>{
  let tries=0;
  const t=setInterval(()=>{
    tries++;
    try{
      if(typeof kakao!=='undefined'&&kakao.maps&&kakao.maps.services){
        psvc=new kakao.maps.services.Places();
        gcsvc=new kakao.maps.services.Geocoder();
        kakaoReady=true;
        clearInterval(t);
      }
    }catch(e){}
    if(tries>30)clearInterval(t);
  },300);
});

function buildGrid(){
  const grid=document.getElementById('memberGrid');
  grid.innerHTML='';
  FRIENDS.forEach((f,i)=>{
    const chip=document.createElement('div');
    chip.className='m-chip';
    const av=f.img
      ?`<img src="${f.img}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;" />`
      :`<div class="chip-av ${f.g}">${f.name[0]}</div>`;
    chip.innerHTML=av+`<div class="chip-name">${f.name}</div>`;
    chip.onclick=()=>{
      if(selected.has(i)){selected.delete(i);chip.classList.remove('on');}
      else{selected.add(i);chip.classList.add('on');}
      document.getElementById('memberCount').textContent=selected.size+'명 선택됨';
      autoCalc();
    };
    grid.appendChild(chip);
  });
}
buildGrid();

const DESCS=['모두 완전히 균등하게 부담','거리 차이를 아주 약하게 반영','거리 차이를 약하게 반영','거리 차이를 보통으로 반영','거리 차이를 강하게 반영','거리 차이를 최대로 반영 (가까울수록 훨씬 더 부담)'];
let currentWeight=0;
function selectWeight(v){
  currentWeight=v;
  for(let i=0;i<=5;i++){
    const b=document.getElementById('wbtn'+i);
    if(b) b.className='wbtn'+(i===v?' active':'');
  }
  document.getElementById('wd').textContent=DESCS[v];
  autoCalc();
}
selectWeight(0);

function showErr(m){const e=document.getElementById('errMsg');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),4000);}

function searchVenue(){
  if(!kakaoReady)return showErr('카카오 지도 로딩 중이에요. 잠시 후 다시 시도해 주세요.');
  const q=document.getElementById('venueInput').value.trim();
  if(!q)return showErr('장소를 입력해 주세요');
  const tag=document.getElementById('venueTag');
  document.getElementById('cands').classList.remove('show');
  tag.innerHTML='<span class="spin"></span>위치 검색 중...';
  tag.classList.add('show');

  psvc.keywordSearch(q,(results,status)=>{
    if(status===kakao.maps.services.Status.OK&&results.length>0){
      tag.classList.remove('show');
      const places=results.slice(0,5).map(r=>({name:r.place_name,addr:r.road_address_name||r.address_name,lat:parseFloat(r.y),lng:parseFloat(r.x)}));
      if(places.length===1)selectPlace(places[0].name,places[0].lat,places[0].lng);
      else showCands(places);
    }else{
      gcsvc.addressSearch(q,(res2,st2)=>{
        tag.classList.remove('show');
        if(st2===kakao.maps.services.Status.OK&&res2.length>0){
          const places=res2.slice(0,5).map(r=>({name:r.address_name,addr:r.road_address_name||'',lat:parseFloat(r.y),lng:parseFloat(r.x)}));
          if(places.length===1)selectPlace(places[0].name,places[0].lat,places[0].lng);
          else showCands(places);
        }else{
          showErr('장소를 찾지 못했어요. 더 구체적으로 입력해 보세요.');
        }
      });
    }
  });
}

function showCands(list){
  const cl=document.getElementById('candList');cl.innerHTML='';
  list.forEach(item=>{
    const div=document.createElement('div');div.className='cand-item';
    div.innerHTML='📍 <strong>'+item.name+'</strong>'+(item.addr&&item.addr!==item.name?'<br><span style="font-size:11px;color:#aaa">'+item.addr+'</span>':'');
    div.onclick=()=>selectPlace(item.name,item.lat,item.lng);
    cl.appendChild(div);
  });
  document.getElementById('cands').classList.add('show');
}

function selectPlace(name,lat,lng){
  vLat=lat;vLng=lng;
  const tag=document.getElementById('venueTag');
  tag.textContent='📍 '+name;
  tag.classList.add('show');
  document.getElementById('cands').classList.remove('show');
  autoCalc();
}

function hav(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function calcAmounts(dists,total,power){
  const n=dists.length;
  if(n===0)return[];
  if(power===0){
    const base=Math.floor(total/n/100)*100;
    const arr=dists.map(()=>base);
    arr[0]+=total-arr.reduce((a,b)=>a+b,0);
    return arr;
  }
  const t=power/5;
  const maxDist=Math.max(...dists)||1;
  // epsilon: power 낮을수록 크게(차이 적게), 높을수록 작게(차이 크게)
  const epsilon=maxDist*(1-0.8*t);
  const invD=dists.map(d=>1/(d+epsilon));
  const sumInv=invD.reduce((a,b)=>a+b,0);
  const shares=invD.map(v=>v/sumInv);
  // 100원 단위 반올림 + 오차 보정
  const raw=shares.map(s=>s*total);
  const fl=raw.map(v=>Math.floor(v/100)*100);
  const rem=total-fl.reduce((a,b)=>a+b,0);
  raw.map((v,i)=>({i,r:v-fl[i]})).sort((a,b)=>b.r-a.r)
     .slice(0,Math.round(rem/100)).forEach(o=>fl[o.i]+=100);
  return fl;
}

function autoCalc(){
  // 조건 미충족시 조용히 종료 (에러 없이)
  if(!vLat) return;
  const total=parseInt(document.getElementById('totalInput').value);
  if(!total||total<=0) return;
  if(selected.size<2) return;
  calculate(true);
}

function calculate(silent){
  if(!vLat)return silent||showErr('먼저 모임 장소를 검색해 주세요');
  const total=parseInt(document.getElementById('totalInput').value);
  if(!total||total<=0)return silent||showErr('금액을 입력해 주세요');
  if(selected.size<2)return silent||showErr('2명 이상 선택해 주세요');
  const power=currentWeight;
  const participants=FRIENDS.filter((_,i)=>selected.has(i));
  const data=participants.map(f=>{
    const hd=hav(f.hLat,f.hLng,vLat,vLng),wd=hav(f.wLat,f.wLng,vLat,vLng);
    return{...f,dist:Math.min(hd,wd),closer:hd<=wd?'집':'직장'};
  });
  const amounts=calcAmounts(data.map(d=>d.dist),total,power);
  const sorted=data.map((d,i)=>({...d,amount:amounts[i]})).sort((a,b)=>b.amount-a.amount);
  document.getElementById('tdisp').textContent=total.toLocaleString()+'원';
  renderAnim(sorted);renderList(sorted);
  const el=document.getElementById('result');
  el.classList.add('show');
  if(!silent) el.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderAnim(sorted){
  const row=document.getElementById('arow');row.innerHTML='';
  const mid=Math.floor(sorted.length/2);
  sorted.forEach((f,i)=>{
    const happy=i>=mid;
    const el=document.createElement('div');
    el.className='ci '+(happy?'happy':'sad');
    el.style.cssText=`opacity:0;transform:scale(0.6);transition:opacity .35s ease ${.1+i*.07}s,transform .35s ease ${.1+i*.07}s`;
    const imgHtml=f.img
      ?`<img class="ci-img" src="${f.img}" />`

}
function renderList(sorted){

      ?`<img src="${f.img}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`

    setTimeout(()=>{el.style.opacity='1';el.style.transform='translateY(0)';},30+i*60);
  });
}


/* ===== 사다리타기 v2 ===== */
const LCOLS=6;
// SVG 크기: viewBox="0 0 300 360"
const LSW=300,LSH=360;
const LTOP=52,LBOT=296; // 세로선 시작/끝 y
const LX=[];
for(let i=0;i<LCOLS;i++) LX.push(26+i*(LSW-52)/(LCOLS-1));

let lEdges=[],lDest=[],lPicked=null,lWeight=null,lShuffled=[];

function buildLadder(){
  lEdges=[];
  // 가로선 행 수 충분히 (10행)
  const ROWS=10;
  const yStep=(LBOT-LTOP)/(ROWS+1);
  for(let r=1;r<=ROWS;r++){
    const y=LTOP+r*yStep;
    const used=new Set();
    for(let c=0;c<LCOLS-1;c++){
      if(used.has(c)||used.has(c+1))continue;
      if(Math.random()>0.38){lEdges.push({c1:c,c2:c+1,y});used.add(c);used.add(c+1);}
    }
  }
  // 경로 추적
  lDest=[];
  const sorted=[...lEdges].sort((a,b)=>a.y-b.y);
  for(let s=0;s<LCOLS;s++){
    let cur=s;
    for(const e of sorted){if(e.c1===cur)cur=e.c2;else if(e.c2===cur)cur=e.c1;}
    lDest.push(cur);
  }
}

// 선택한 col의 경로 좌표 배열 반환
function tracePath(col){
  const sorted=[...lEdges].sort((a,b)=>a.y-b.y);
  let cur=col;
  const pts=[{x:LX[cur],y:LTOP}];
  for(const e of sorted){
    if(e.c1===cur){
      pts.push({x:LX[cur],y:e.y});
      pts.push({x:LX[e.c2],y:e.y});
      cur=e.c2;
    } else if(e.c2===cur){
      pts.push({x:LX[cur],y:e.y});
      pts.push({x:LX[e.c1],y:e.y});
      cur=e.c1;
    }
  }
  pts.push({x:LX[cur],y:LBOT});
  return pts;
}

// SVG 요소 생성 헬퍼
function svgEl(tag,attrs,svg){
  const ns='http://www.w3.org/2000/svg';
  const el=document.createElementNS(ns,tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  if(svg) svg.appendChild(el);
  return el;
}

function drawBase(svg,pickedCol){
  const ACCENT='#1a73e8',ACCENTBG='#e8f0fe',GRAY='#ddd',GRAY2='#bbb';
  svg.innerHTML='';
  svg.setAttribute('viewBox','0 0 '+LSW+' '+LSH);

  // 모든 세로선 (회색)
  LX.forEach((x,i)=>{
    svgEl('line',{x1:x,y1:LTOP,x2:x,y2:LBOT,stroke:GRAY,'stroke-width':'2','stroke-linecap':'round'},svg);
  });

  // 모든 가로선 (회색)
  lEdges.forEach(e=>{
    svgEl('line',{x1:LX[e.c1],y1:e.y,x2:LX[e.c2],y2:e.y,stroke:GRAY,'stroke-width':'2','stroke-linecap':'round'},svg);
  });

  // 위쪽 번호 원
  LX.forEach((x,i)=>{
    const g=svgEl('g',{cursor:pickedCol===-1?'pointer':'default'},svg);
    svgEl('circle',{cx:x,cy:LTOP-18,r:'15',fill:ACCENTBG,stroke:ACCENT,'stroke-width':'1.5'},g);
    const t=svgEl('text',{x,y:LTOP-13,'text-anchor':'middle','font-size':'12','font-weight':'700',fill:ACCENT,'pointer-events':'none'},g);
    t.textContent=String(i+1);
    if(pickedCol===-1) g.onclick=()=>pickCol(i);
  });

  // 아래쪽 결과 원 (선택 전: 모두 ?)
  LX.forEach((x,i)=>{
    const isWin=(i===pickedCol);
    const val=isWin?String(lWeight):'?';
    const fill=isWin?ACCENT:'#f0f0f0';
    const stroke=isWin?ACCENT:GRAY2;
    const textFill=isWin?'#fff':GRAY2;
    svgEl('circle',{cx:x,cy:LBOT+18,r:'15',fill,stroke,'stroke-width':isWin?'2':'1'},svg);
    const t=svgEl('text',{x,y:LBOT+23,'text-anchor':'middle','font-size':'12','font-weight':'700',fill:textFill,'pointer-events':'none'},svg);
    t.textContent=val;
  });

  // 힌트
  if(pickedCol===-1){
    const h=svgEl('text',{x:LSW/2,y:14,'text-anchor':'middle','font-size':'11',fill:'#aaa'},svg);
    h.textContent='번호를 눌러 선택하세요';
  }
}

// 경로 애니메이션: polyline을 stroke-dashoffset으로 그리기
function animatePath(col,onDone){
  const svg=document.getElementById('ladderSvg');
  const pts=tracePath(col);
  // 경로 polyline
  const pointsStr=pts.map(p=>p.x+','+p.y).join(' ');
  const poly=svgEl('polyline',{
    points:pointsStr,
    fill:'none',stroke:'#1a73e8','stroke-width':'3','stroke-linecap':'round','stroke-linejoin':'round'
  },svg);
  // 총 길이 계산
  let totalLen=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;
    totalLen+=Math.sqrt(dx*dx+dy*dy);
  }
  poly.style.strokeDasharray=totalLen;
  poly.style.strokeDashoffset=totalLen;

  // 출발 원 강조
  const startX=LX[col];
  const dot=svgEl('circle',{cx:startX,cy:LTOP-18,r:'15',fill:'#1a73e8',stroke:'#1a73e8','stroke-width':'1.5'},svg);
  const dotT=svgEl('text',{x:startX,y:LTOP-13,'text-anchor':'middle','font-size':'12','font-weight':'700',fill:'#fff','pointer-events':'none'},svg);
  dotT.textContent=String(col+1);

  const DUR=2800; // ms
  const start=performance.now();
  function step(now){
    const p=Math.min((now-start)/DUR,1);
    // easeInOut
    const ease=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    poly.style.strokeDashoffset=totalLen*(1-ease);
    if(p<1){requestAnimationFrame(step);}
    else{poly.style.strokeDashoffset=0;setTimeout(onDone,120);}
  }
  requestAnimationFrame(step);
}

// 도착 원 당첨 표시
function showWinnerCircle(col){
  const svg=document.getElementById('ladderSvg');
  const destCol=lDest[col];
  const x=LX[destCol];
  // 기존 ? 원 위에 덮어씌우기
  svgEl('circle',{cx:x,cy:LBOT+18,r:'15',fill:'#1a73e8',stroke:'#1a73e8','stroke-width':'2'},svg);
  const t=svgEl('text',{x,y:LBOT+23,'text-anchor':'middle','font-size':'12','font-weight':'700',fill:'#fff','pointer-events':'none'},svg);
  t.textContent=String(lWeight);
}

// 폭죽 캔버스 애니메이션
function fireConfetti(){
  let canvas=document.getElementById('confettiCanvas');
  if(!canvas){
    canvas=document.createElement('canvas');
    canvas.id='confettiCanvas';
    canvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999';
    document.body.appendChild(canvas);
  }
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const COLORS=['#1a73e8','#ea4335','#fbbc04','#34a853','#ff6d00','#ab47bc','#00bcd4'];
  const particles=[];
  const CX=canvas.width/2, CY=canvas.height*0.45;
  for(let i=0;i<130;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=3+Math.random()*7;
    particles.push({
      x:CX,y:CY,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-4,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      w:6+Math.random()*6,h:3+Math.random()*3,
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*8,
      alpha:1,life:1
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;
      p.vx*=0.99;p.rot+=p.rotV;
      p.alpha-=0.012;
      if(p.alpha>0){
        alive=true;
        ctx.save();
        ctx.globalAlpha=p.alpha;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      }
    });
    if(alive)requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);}
  }
  requestAnimationFrame(draw);
}

function pickCol(col){
  if(lPicked!==null)return;
  lPicked=col;
  const destIdx=lDest[col];
  lWeight=lShuffled[destIdx];
  document.getElementById('ladderSub').textContent='경로를 따라가는 중...';

  // 경로 애니메이션 후 당첨 표시
  animatePath(col,()=>{
    showWinnerCircle(col);
    document.getElementById('ladderSub').textContent='선택 완료!';
    document.getElementById('ladderResult').innerHTML='가중치 <span>'+lWeight+'</span> 당첨! 🎉';
    document.getElementById('applyBtn').classList.remove('hidden');
    fireConfetti();
  });
}

function openLadder(){
  lPicked=null;lWeight=null;
  lShuffled=[0,1,2,3,4,5].sort(()=>Math.random()-0.5);
  buildLadder();
  document.getElementById('ladderSub').textContent='1번~6번 중 하나를 선택하세요';
  document.getElementById('ladderResult').innerHTML='';
  document.getElementById('applyBtn').classList.add('hidden');
  const svg=document.getElementById('ladderSvg');
  drawBase(svg,-1);
  document.getElementById('ladderModal').classList.add('open');
}

function closeLadder(){
  document.getElementById('ladderModal').classList.remove('open');
}

function applyWeight(){
  if(lWeight===null)return;
  selectWeight(lWeight);
  closeLadder();
}
